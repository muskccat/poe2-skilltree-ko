    <style>
      #boot {
        position: fixed;
        inset: 0;

      #boot .ring {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 2px solid rgba(200, 163, 90, 0.24);
        border-top-color: #f1d6a0;
        animation: bootspin 1s linear infinite;
      }
      #boot .t {
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: #f1d6a0;
        padding-left: 0.42em;
        text-shadow: 0 0 30px rgba(200, 163, 90, 0.4);
      }
      #boot .s {
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #9c9279;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
